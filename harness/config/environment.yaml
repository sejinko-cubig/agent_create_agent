# LangGraph Analysis Creator - 환경 설정

runtime:
  python: "3.11+"

dependencies:
  pip:
    - anthropic>=0.90.0
    - langgraph>=0.2.0
    - langchain-anthropic>=0.3.0
    - langchain-core>=0.3.0
    - pyyaml>=6.0

environment_variables:
  required:  # 필수 환경변수
    - ANTHROPIC_API_KEY
  optional:  # 선택 환경변수
    - LANGCHAIN_TRACING_V2  # LangSmith 추적용
    - LANGCHAIN_API_KEY

managed_agent:
  type: cloud
  networking: unrestricted
  init_script: "pip install anthropic langgraph langchain-anthropic pyyaml -q"
